      description:
        - Contributed to development of automated pipeline for extracting metadata and predicting contextual relationships between files in large scientific repositories
        - Developed collection of modules for extracting metadata from images; functionality included feature-based clustering, text extraction using optical character recognition, and image classification through use of support vector machine models
        - Module tested on over 3,500 images; results published in poster, placed 3rd in ACM’s undergraduate Student Poster Competition at Super Computing (SC) 2017 Conference

