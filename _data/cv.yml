    - title: Intern
      institution: ORNL - Computational Data Analytics, Oak Ridge, TN
      year: 2018
      description:
        - Carried out text mining project dealing with classification of NIEHS research publications
        - Trained Hierarchical Attention Networks and other models including Naive Bayes and Random Forests to classify publications based on satisfaction of various criteria
        - Leveraged frameworks including Hierarchical Attention Networks and Tf-Idf Based Weighting, and spatial distances between word groupings and criteria descriptions to quantify the relevance of words or word groups to criteria queries and category predictions


    - title: Undergraduate Researcher
